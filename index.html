<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1><i class="fa-solid fa-list-check"></i> TO-DO List</h1>
            <p class="subtitle"></p>
        </header>

        <div class="input-section">
            <input type="text" id="task-input" placeholder="What needs to be done?">
            <input type="datetime-local" id="task-datetime">
            <button id="add-task-btn"><i class="fa-solid fa-plus"></i> Add Task</button>
        </div>

        <div class="filter-controls">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="task-list">
            </ul>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Edit Task</h3>
            <input type="text" id="edit-task-input">
            <input type="datetime-local" id="edit-task-datetime">
            <div class="modal-actions">
                <button id="save-edit-btn" class="btn-save">Save Changes</button>
                <button id="close-modal-btn" class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
